# Decap CMS config for Novak Lab (HugoBlox academic-cv).
#
# Backend: GitHub. The site is deployed via GitHub Actions from
# NovakLabOSU/NovakLabOSUsourceAcademic → NovakLabOSU/NovakLabOSU.github.io.
# Decap's `github` backend needs an OAuth helper. For production editing, set
# up an OAuth provider (e.g. decap-server, Netlify, or a self-hosted proxy)
# and update `base_url`/`auth_endpoint` here if needed.
#
# For local editing: run `npx decap-server` then visit
# http://localhost:1313/admin/ while `hugo server` is running.

backend:
  name: github
  repo: NovakLabOSU/NovakLabOSUsourceAcademic
  branch: main
  squash_merges: true

local_backend: true

media_folder: assets/media
public_folder: /media

collections:
  - name: publications
    label: Publications
    label_singular: Publication
    folder: content/publication
    path: '{{slug}}/index'
    create: true
    media_folder: ''
    public_folder: ''
    summary: '{{title}} ({{year date}})'
    sortable_fields: ['date', 'title']
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - label: Date
        name: date
        widget: datetime
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
      - label: Publication type
        name: publication_types
        widget: select
        multiple: true
        default: ['2']
        options:
          - { label: 'Uncategorized', value: '0' }
          - { label: 'Journal article', value: '2' }
          - { label: 'Preprint / Working paper', value: '3' }
          - { label: 'Conference paper', value: '1' }
          - { label: 'Report', value: '4' }
          - { label: 'Book', value: '5' }
          - { label: 'Book section', value: '6' }
          - { label: 'Thesis', value: '7' }
      - { label: Authors, name: authors, widget: list, default: ['Mark Novak'] }
      - label: Author notes (one per author, optional)
        name: author_notes
        widget: list
        required: false
      - { label: Publication, name: publication, widget: string, hint: 'e.g. *Ecology Letters*' }
      - { label: Abstract, name: abstract, widget: text, required: false }
      - label: DOI (bare, e.g. 10.1234/abcd)
        name: hugoblox
        widget: object
        required: false
        fields:
          - label: IDs
            name: ids
            widget: object
            required: false
            fields:
              - { label: DOI, name: doi, widget: string, required: false }
              - { label: arXiv, name: arxiv, widget: string, required: false }
              - { label: PubMed, name: pubmed, widget: string, required: false }
      - label: Links
        name: links
        widget: list
        required: false
        summary: '{{fields.type}}: {{fields.url}}'
        fields:
          - label: Type
            name: type
            widget: select
            required: false
            options:
              - pdf
              - preprint
              - doi
              - code
              - dataset
              - poster
              - slides
              - video
              - source
              - project
          - { label: URL, name: url, widget: string }
          - { label: Label (overrides type), name: label, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Projects, name: projects, widget: list, required: false, hint: 'Folder names under content/projects/' }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false, required: false }

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    path: '{{slug}}/index'
    create: true
    media_folder: ''
    public_folder: ''
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Date, name: date, widget: datetime, required: false }
      - { label: External link (replaces detail page), name: external_link, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: courses
    label: Courses
    label_singular: Course
    folder: content/courses
    path: '{{slug}}/index'
    create: true
    media_folder: ''
    public_folder: ''
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Tags, name: tags, widget: list, required: false, hint: 'e.g. Undergraduate, Graduate' }
      - { label: Weight (sort order), name: weight, widget: number, required: false, value_type: int }
      - { label: Body, name: body, widget: markdown, required: false }

  - name: authors
    label: Authors
    label_singular: Author
    folder: data/authors
    extension: yaml
    format: yaml
    create: true
    identifier_field: slug
    summary: '{{fields.name.display}} — {{fields.role}}'
    fields:
      - { label: Schema, name: schema, widget: hidden, default: 'hugoblox/author/v1' }
      - { label: Slug (kebab-case, matches filename), name: slug, widget: string }
      - { label: Is site owner?, name: is_owner, widget: boolean, default: false, required: false }
      - { label: Weight (sort order in team listings), name: weight, widget: number, required: false, value_type: int }
      - label: Name
        name: name
        widget: object
        fields:
          - { label: Display name, name: display, widget: string }
          - { label: Given name, name: given, widget: string, required: false }
          - { label: Family (last) name, name: family, widget: string, required: false }
      - { label: Role, name: role, widget: string, required: false }
      - { label: Bio, name: bio, widget: text, required: false }
      - label: Affiliations
        name: affiliations
        widget: list
        required: false
        fields:
          - { label: Name, name: name, widget: string }
          - { label: URL, name: url, widget: string, required: false }
      - label: Education
        name: education
        widget: list
        required: false
        fields:
          - { label: Degree, name: degree, widget: string, required: false }
          - { label: Institution, name: institution, widget: string, required: false }
          - { label: Summary (e.g. year), name: summary, widget: string, required: false }
      - label: Links (email, scholar, github, orcid, …)
        name: links
        widget: list
        required: false
        summary: '{{fields.icon}}: {{fields.url}}'
        fields:
          - { label: Icon (e.g. at-symbol, brands/github, academicons/orcid), name: icon, widget: string }
          - { label: URL, name: url, widget: string }
      - { label: User groups, name: user_groups, widget: list, required: false, hint: 'e.g. Lab members, Alumni, PI' }
      - { label: Highlight name in author lists, name: highlight_name, widget: boolean, default: true, required: false }

  - name: pages
    label: Standalone pages
    files:
      - label: Homepage
        name: home
        file: content/_index.md
        fields:
          - { label: Title, name: title, widget: string, required: false }
          - { label: Date, name: date, widget: datetime, required: false }
          - { label: Type, name: type, widget: hidden, default: 'landing' }
          - label: Sections
            name: sections
            widget: list
            required: false
            hint: 'Each section is a HugoBlox block (markdown, content-collection, team-showcase, etc.). Edit cautiously — the structure is schema-sensitive.'
            fields:
              - { label: Block, name: block, widget: string }
              - { label: ID, name: id, widget: string, required: false }
              - label: Content
                name: content
                widget: object
                required: false
                fields:
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Text, name: text, widget: markdown, required: false }
                  - { label: Count, name: count, widget: number, required: false, value_type: int }
                  - { label: User groups, name: user_groups, widget: list, required: false }
                  - label: Filters
                    name: filters
                    widget: object
                    required: false
                    fields:
                      - { label: Folders, name: folders, widget: list, required: false }
              - { label: Design (raw object), name: design, widget: object, required: false, fields: [{ label: View, name: view, widget: string, required: false }, { label: Columns, name: columns, widget: string, required: false }] }
      - label: Join us
        name: joinus
        file: content/joinus/index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
